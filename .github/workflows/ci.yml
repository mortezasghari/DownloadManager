name: CI

# Spec §14: AOT publish on all RIDs is a CI gate on every phase.
# A phase is not "done" until build is clean, tests pass, and
# `dotnet publish /p:PublishAot=true` succeeds and smoke-runs on every RID.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write       # the release job creates the tag + GitHub Release
  pull-requests: read   # the version job reads the merged PR's bump label

jobs:
  # Calculated versioning (ADR-0025): the version is never hand-typed. It is computed from the latest
  # release tag plus the merged PR's bump LABEL (major / minor / none=build) using the same VersionBump
  # logic the unit tests lock, invoked via the app's `--next-version` mode. On a PR this is a preview
  # (built, not released); on a push to master it is the version that gets built, injected, and released.
  version:
    name: Calculate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
      release: ${{ steps.calc.outputs.release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # need the full tag history to find the latest release

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Calculate next version from latest tag + PR label
        id: calc
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          # Latest release tag vX.Y.Z (highest by version), or 0.0.0 if there is none yet.
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          LATEST=${LATEST:-0.0.0}

          # Bump intent = PR LABEL only (never a commit-message keyword).
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            LABELS="${{ join(github.event.pull_request.labels.*.name, ' ') }}"
            RELEASE=false
          else
            # push to master: read the labels of the PR this merge commit closed.
            LABELS=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
              --jq '[.[].labels[].name] | join(" ")' 2>/dev/null || echo "")
            RELEASE=true
          fi
          case " $LABELS " in
            *" major "*) LABEL=major ;;
            *" minor "*) LABEL=minor ;;
            *)           LABEL="" ;;
          esac

          # Compute via the tested bump logic (the app's --next-version mode). Build once in Debug.
          dotnet build src/DownloadManager.UI/DownloadManager.UI.csproj -c Debug --nologo -v q
          DLL=$(find src/DownloadManager.UI/bin/Debug -name DownloadManager.UI.dll | head -1)
          NEXT=$(dotnet "$DLL" --next-version "$LATEST" "$LABEL" | sed -n 's/^NEXT_VERSION=//p')

          echo "latest=$LATEST  label=${LABEL:-<none>}  ->  next=$NEXT  (release=$RELEASE)"
          [ -n "$NEXT" ] || { echo "::error::failed to compute next version"; exit 1; }
          echo "version=$NEXT"  >> "$GITHUB_OUTPUT"
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"

  build-test-publish:
    name: ${{ matrix.rid }}
    needs: version
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,     rid: linux-x64 }
          - { os: ubuntu-24.04-arm,  rid: linux-arm64 }
          - { os: windows-latest,    rid: win-x64 }
          - { os: macos-latest,      rid: osx-arm64 }
          # osx-x64 is a dedicated job below: GitHub-hosted Intel macOS (macos-13 / macos-13-large)
          # would not allocate a runner, so osx-x64 is built + tested + smoke-run as x86_64 under
          # Rosetta 2 on the Apple Silicon image (real x86_64 ISA + syscall ABI; ADR-0014).

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Native AOT on Linux links through clang; install the toolchain explicitly
      # so the gate is reproducible regardless of the runner image baseline.
      - name: Install Linux AOT toolchain
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore DownloadManager.slnx

      - name: Build (warnings = errors)
        # Use the GitHub-substituted value (not a shell var) so it works under pwsh on Windows too.
        # The version is a calculated numeric string (e.g. 1.2.3) — no shell-injection surface.
        run: dotnet build DownloadManager.slnx -c Release --no-restore -p:Version=${{ needs.version.outputs.version }}

      - name: Test
        run: dotnet test DownloadManager.slnx -c Release --no-build

      - name: Publish Native AOT (fail on any trim/IL warning)
        shell: bash
        run: |
          set -o pipefail
          dotnet publish src/DownloadManager.UI/DownloadManager.UI.csproj \
            -c Release -r ${{ matrix.rid }} -p:Version=$VERSION \
            -o artifacts/publish/${{ matrix.rid }} 2>&1 | tee publish.log
          if grep -nE ': warning |IL[0-9]{4}' publish.log; then
            echo "::error::AOT publish emitted trim/IL warnings"; exit 1
          fi

      # Packaging tidy (Phase 5.6): separate native debug symbols into a distinct artifact (kept for
      # symbolication, not shipped beside the binary) and drop any stray managed reference PDBs. The
      # binary itself is already stripped (StripSymbols=true). Avalonia's unmanaged native deps
      # (libSkiaSharp / libHarfBuzzSharp / libAvaloniaNative / av_libGLESv2) are prebuilt C/C++
      # libraries with no static-link path, so they remain as required sidecars beside the binary.
      - name: Separate debug symbols and drop stray sidecars
        shell: bash
        run: |
          PUB="artifacts/publish/${{ matrix.rid }}"
          SYM="artifacts/symbols/${{ matrix.rid }}"
          mkdir -p "$SYM"
          for s in "$PUB/DownloadManager.UI.dbg" "$PUB/DownloadManager.UI.pdb"; do
            [ -f "$s" ] && mv "$s" "$SYM/"
          done
          [ -d "$PUB/DownloadManager.UI.dSYM" ] && mv "$PUB/DownloadManager.UI.dSYM" "$SYM/"
          rm -f "$PUB"/DownloadManager.*.pdb   # belt-and-suspenders: managed reference PDBs
          echo "== shipped bundle (${{ matrix.rid }}) =="; ls -la "$PUB"
          echo "== separated symbols (${{ matrix.rid }}) =="; ls -la "$SYM"

      # Headless native self-test on EVERY RID: runs the published binary with --smoke (no display).
      # It proves the AOT-fragile paths in the real native image: (1) settings.json round-trips via the
      # source-gen context — a reflection binder would pass JIT tests and fail only here (ADR-0016);
      # (2) history.json round-trips incl. the string-enum converter (ADR-0019); (3) queue.log (the
      # lifecycle event log) round-trips via its source-gen context (ADR-0021); (4) the platform's native
      # preallocation P/Invoke executed (ADR-0006).
      - name: Self-test native binary (--smoke, all RIDs) + assert injected version
        shell: bash
        run: |
          set -o pipefail
          BIN="artifacts/publish/${{ matrix.rid }}/DownloadManager.UI"
          [ -f "$BIN.exe" ] && BIN="$BIN.exe"
          OUT=$("$BIN" --smoke)
          echo "$OUT"
          # VERSION OK must report the CI-calculated version that was injected — not the 1.0.0 SDK default.
          echo "$OUT" | grep -q "VERSION OK" || { echo "::error::no VERSION line in smoke output"; exit 1; }
          REPORTED=$(echo "$OUT" | sed -n 's/.*VERSION OK \[[^]]*\]: //p')
          echo "${{ matrix.rid }} reported version: $REPORTED (expected $VERSION)"
          [ "$REPORTED" = "$VERSION" ] || { echo "::error::version not injected ($REPORTED != $VERSION)"; exit 1; }

      # --open-settings expands the settings panel AND seeds a display-only queue row, so the templated
      # controls actually RENDER under Native AOT + compiled bindings — not just a successful publish:
      # the adaptive WrapPanel + schedule TimePicker (ADR-0023) and the icon buttons PathIcon + ToolTip
      # (ADR-0024). Any AOT trim/binding failure in those controls crashes the launch and fails this step.
      - name: GUI smoke-launch (Linux, headless via xvfb — renders TimePicker + PathIcon/ToolTip + WrapPanel)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get install -y xvfb
          timeout 15 xvfb-run -a ./artifacts/publish/${{ matrix.rid }}/DownloadManager.UI --open-settings &
          PID=$!
          sleep 8
          if kill -0 $PID 2>/dev/null; then echo "launched OK (new controls rendered)"; kill $PID; else echo "exited early"; exit 1; fi

      - name: Upload native image (binary bundle, symbols separated out)
        uses: actions/upload-artifact@v7
        with:
          name: DownloadManager-${{ matrix.rid }}
          path: artifacts/publish/${{ matrix.rid }}

      - name: Upload debug symbols (separate artifact)
        uses: actions/upload-artifact@v7
        with:
          name: DownloadManager-${{ matrix.rid }}-symbols
          path: artifacts/symbols/${{ matrix.rid }}

  # osx-x64 (macOS Intel) — proven under Rosetta 2 on the Apple Silicon image, because GitHub-hosted
  # Intel macOS runners (macos-13 / macos-13-large) would not allocate. Everything runs as a real
  # x86_64 process (x64 SDK invoked via `arch -x86_64`), so the build, the FULL test suite — including
  # the preallocation success-path test — the AOT publish, and --smoke all execute on x86_64 and exercise
  # the F_PREALLOCATE struct layout / variadic-fcntl marshalling. Translation layer, not bare-metal Intel
  # (ADR-0014).
  osx-x64-rosetta:
    name: osx-x64 (Rosetta)
    needs: version
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rosetta 2
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Install .NET 10 SDK (x64)
        run: |
          curl -fsSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
          chmod +x dotnet-install.sh
          ./dotnet-install.sh --channel 10.0 --architecture x64 --install-dir "$HOME/dotnet-x64"

      - name: Build, test, publish, smoke — all as x86_64 (Rosetta)
        shell: bash
        run: |
          set -o pipefail
          DOTNET="$HOME/dotnet-x64/dotnet"
          x64() { arch -x86_64 "$DOTNET" "$@"; }

          # Prove we are genuinely running the x64 toolchain (RID should be osx-x64).
          x64 --info | grep -iE 'Architecture|RID' || true

          x64 restore DownloadManager.slnx
          x64 build DownloadManager.slnx -c Release --no-restore -p:Version=$VERSION
          x64 test DownloadManager.slnx -c Release --no-build
          x64 publish src/DownloadManager.UI/DownloadManager.UI.csproj \
            -c Release -r osx-x64 -p:Version=$VERSION -o artifacts/publish/osx-x64 2>&1 | tee publish.log
          if grep -nE ': warning |IL[0-9]{4}' publish.log; then
            echo "::error::AOT publish emitted trim/IL warnings"; exit 1
          fi

      - name: Separate debug symbols and drop stray sidecars
        shell: bash
        run: |
          PUB="artifacts/publish/osx-x64"
          SYM="artifacts/symbols/osx-x64"
          mkdir -p "$SYM"
          [ -f "$PUB/DownloadManager.UI.dbg" ] && mv "$PUB/DownloadManager.UI.dbg" "$SYM/"
          [ -d "$PUB/DownloadManager.UI.dSYM" ] && mv "$PUB/DownloadManager.UI.dSYM" "$SYM/"
          rm -f "$PUB"/DownloadManager.*.pdb
          echo "== shipped bundle (osx-x64) =="; ls -la "$PUB"
          echo "== separated symbols (osx-x64) =="; ls -la "$SYM"

      # The x64 proof: run the actual x86_64 native binary under Rosetta. Exercises source-gen config
      # load (ADR-0016), prints the F_PREALLOCATE line (ADR-0006), and reports the injected version.
      - name: Self-test native binary (--smoke as x86_64) + assert injected version
        shell: bash
        run: |
          set -o pipefail
          OUT=$(arch -x86_64 artifacts/publish/osx-x64/DownloadManager.UI --smoke)
          echo "$OUT"
          echo "$OUT" | grep -q "VERSION OK" || { echo "::error::no VERSION line in smoke output"; exit 1; }
          REPORTED=$(echo "$OUT" | sed -n 's/.*VERSION OK \[[^]]*\]: //p')
          echo "osx-x64 reported version: $REPORTED (expected $VERSION)"
          [ "$REPORTED" = "$VERSION" ] || { echo "::error::version not injected ($REPORTED != $VERSION)"; exit 1; }

      - name: Upload native image (binary bundle, symbols separated out)
        uses: actions/upload-artifact@v7
        with:
          name: DownloadManager-osx-x64
          path: artifacts/publish/osx-x64

      - name: Upload debug symbols (separate artifact)
        uses: actions/upload-artifact@v7
        with:
          name: DownloadManager-osx-x64-symbols
          path: artifacts/symbols/osx-x64

  # Auto-release on every master merge (ADR-0025): once all five RIDs are green, tag the merge commit
  # vX.Y.Z and publish a GitHub Release with the per-RID binary bundles attached. This only packages the
  # artifacts the matrix already built — no real installers (the installer phase is parked). The tag also
  # becomes the "latest release" the next merge's version calculation reads.
  release:
    name: Release
    needs: [version, build-test-publish, osx-x64-rosetta]
    if: github.event_name == 'push' && needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download per-RID binary bundles
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: DownloadManager-*

      - name: Zip each RID's bundle (binaries only, not the separated symbols)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          for dir in artifacts/DownloadManager-*; do
            [ -d "$dir" ] || continue
            case "$dir" in *-symbols) continue ;; esac   # ship binaries; symbols stay as a CI artifact
            name=$(basename "$dir")
            ( cd "$dir" && zip -qr "$GITHUB_WORKSPACE/release/${name}.zip" . )
          done
          echo "== release assets =="; ls -la release

      - name: Create GitHub Release with the calculated version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          V="${{ needs.version.outputs.version }}"
          gh release create "v$V" release/*.zip \
            --target "${{ github.sha }}" \
            --title "v$V" \
            --notes "Automated release **v$V**, calculated from the merged PR's bump label (ADR-0025). Native-AOT binaries for all five RIDs are attached. This is not an installer build (the secured installer/updater phase is parked)."
          echo "Released v$V -> ${{ github.server_url }}/${{ github.repository }}/releases/tag/v$V"